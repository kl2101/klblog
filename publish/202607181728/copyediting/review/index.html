ound:0 0;color:var(--ink);font:inherit;white-space:pre-wrap}.cm-suggestion-text[readonly]{border-color:transparent}.cm-reason{margin-top:6px;color:var(--comment);font-style:italic;white-space:pre-wrap}.cm-review-actions{display:flex;align-items:center;gap:6px;margin-top:8px;color:var(--muted);font-family:-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:12px}.cm-review-actions button{min-height:26px;padding:3px 7px;font-size:12px;border-radius:5px}.cm-review-actions .accept{color:#fff;background:#2d7a4f;border-color:#2d7a4f}.cm-review-actions .reject{color:#fff;background:#9b3434;border-color:#9b3434}.cm-review-actions .edit{color:var(--ink)}.cm-modified-text{background:var(--modified-bg);box-shadow:inset 0 -2px 0 var(--modified-border);border-radius:3px}.selection-tools{position:fixed;z-index:20;display:none;gap:6px;padding:6px;border:1px solid var(--line);border-radius:6px;background:var(--panel);box-shadow:0 8px 24px rgba(0,0,0,.18)}.selection-tools.visible{display:flex}.manual-panel{position:fixed;z-index:30;display:none;width:min(520px,calc(100vw - 24px));padding:10px;border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:0 14px 40px rgba(0,0,0,.22)}.manual-panel.visible{display:block}.manual-panel textarea{width:100%;min-height:90px;resize:vertical;border:1px solid var(--line);border-radius:6px;padding:8px;background:var(--bg);color:var(--ink);font:13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.manual-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}</style></head><body><header><div><div class=title>copyediting Review Workbench</div><div class=meta id=meta>加载中</div></div><div class=toolbar><select id=runSelect aria-label=选择审查轮次></select>

<button id=manualApplyBtn class=primary>应用修改</button></div></div><script type=module>
    import { EditorState, StateEffect, StateField } from "@codemirror/state";
    import { EditorView, Decoration, WidgetType, lineNumbers, keymap, drawSelection } from "@codemirror/view";
    import { defaultKeymap, history, historyKeymap, indentWithTab } from "@codemirror/commands";
    import { markdown, markdownLanguage } from "@codemirror/lang-markdown";
    import { syntaxHighlighting, defaultHighlightStyle, bracketMatching, indentOnInput } from "@codemirror/language";
    import { searchKeymap } from "@codemirror/search";
    import { autocompletion, completionKeymap, closeBrackets, closeBracketsKeymap } from "@codemirror/autocomplete";
    import { oneDark } from "@codemirror/theme-one-dark";

    const state = {
      runId: null,
      runs: [],
      source: '',
      suggestions: [],
      decisions: {},
      manualEditCount: 0,
      manualSelection: null,
      skipNextSuggestionMap: false,
      saving: false,
      activeIndex: 0,
      dark: false,
      view: null,
    };

    const setSuggestionsEffect = StateEffect.define();
    const resolveSuggestionEffect = StateEffect.define();
    const addModifiedEffect = StateEffect.define();

    class SuggestedEditWidget extends WidgetType {
      constructor(suggestion, index, total, decision) {
        super();
        this.suggestion = suggestion;
        this.index = index;
        this.total = total;
        this.decision = decision;
      }
      eq(other) {
        return other.suggestion.id === this.suggestion.id && other.index === this.index && other.total === this.total;
      }
      toDOM() {
        const s = this.suggestion;
        const wrap = document.createElement('div');
        wrap.className = 'cm-suggestion-widget';
        const inner = document.createElement('div');
        inner.className = 'cm-suggestion-inner';

        const textarea = document.createElement('textarea');
        textarea.className = 'cm-suggestion-text';
        textarea.id = `candidate-${s.id}`;
        textarea.value = (this.decision && this.decision.finalText) || s.newText || '';
        textarea.readOnly = true;
        ['mousedown', 'mouseup', 'click', 'dblclick', 'keydown', 'keyup', 'beforeinput', 'input', 'compositionstart', 'compositionupdate', 'compositionend'].forEach(type => {
          textarea.addEventListener(type, event => event.stopPropagation());
        });

        const reason = document.createElement('div');
        reason.className = 'cm-reason';
        reason.textContent = `// ${s.reason || s.changeSummary || '未提供理由'}`;

        const actions = document.createElement('div');
        actions.className = 'cm-review-actions';
        actions.innerHTML = `
          <button class="accept" data-action="accepted">接受</button>
          <button class="reject" data-action="rejected">拒绝</button>
          <button class="edit" data-action="edit">编辑</button>
          <span>${this.index + 1} of ${this.total}</span>`;
        actions.addEventListener('mousedown', event => event.preventDefault());
        actions.addEventListener('click', event => {
          const action = event.target && event.target.dataset && event.target.dataset.action;
          if (!action) return;
          event.preventDefault();
          if (action === 'edit') {
            textarea.readOnly = false;
            textarea.focus();
            return;
          }
          const decision = action === 'accepted' && textarea.value !== s.newText ? 'edited' : action;
          window.dispatchEvent(new CustomEvent('copyediting:decision', {
            detail: { id: s.id, decision, finalText: action === 'rejected' ? null : textarea.value }
          }));
        });

        inner.append(textarea, reason, actions);
        wrap.appendChild(inner);
        return wrap;
      }
      ignoreEvent(event) {
        return event.target instanceof HTMLTextAreaElement || event.target instanceof HTMLButtonElement;
      }
    }

    const oldTextMark = Decoration.mark({ class: 'cm-old-text' });
    const modifiedTextMark = Decoration.mark({ class: 'cm-modified-text' });

    const reviewField = StateField.define({
      create() { return { decorations: Decoration.none, suggestions: [] }; },
      update(value, tr) {
        let suggestions = value.suggestions.map(item => ({ ...item, from: tr.changes.mapPos(item.from), to: tr.changes.mapPos(item.to) }));
        for (const effect of tr.effects) {
          if (effect.is(setSuggestionsEffect)) suggestions = effect.value;
          if (effect.is(resolveSuggestionEffect)) suggestions = suggestions.filter(item => item.id !== effect.value.id);
        }
        return { decorations: buildDecorations(suggestions, tr.state), suggestions };
      },
      provide: field => EditorView.decorations.from(field, value => value.decorations)
    });

    const modifiedField = StateField.define({
      create() { return Decoration.none; },
      update(value, tr) {
        let decorations = value.map(tr.changes);
        for (const effect of tr.effects) {
          if (effect.is(addModifiedEffect) && effect.value.to > effect.value.from) {
            decorations = decorations.update({ add: [modifiedTextMark.range(effect.value.from, effect.value.to)] });
          }
        }
        return decorations;
      },
      provide: field => EditorView.decorations.from(field)
    });

    const lightTheme = EditorView.theme({
      '&': { backgroundColor: '#ffffff', color: '#20201d' },
      '.cm-content': { caretColor: '#265f7f' },
      '.cm-gutters': { backgroundColor: '#f7f7f4', color: '#77736a', borderRight: '1px solid #dedbd2' },
      '.cm-activeLine': { backgroundColor: '#f0f4f5' },
    }, { dark: false });

    function buildDecorations(suggestions, editorState) {
      const ranges = [];
      const ordered = [...suggestions].sort((a, b) => a.from - b.from || a.to - b.to || a.id.localeCompare(b.id));
      const pending = ordered.filter(s => !state.decisions[s.id]);
      ordered.forEach((s, index) => {
        if (state.decisions[s.id]) return;
        const widget = Decoration.widget({ widget: new SuggestedEditWidget(s, pending.indexOf(s), pending.length, state.decisions[s.id]), block: true, side: 1 });
        ranges.push(oldTextMark.range(s.from, s.to));
        ranges.push(widget.range(s.lineTo));
      });
      return Decoration.set(ranges, true);
    }

    function normalizeSuggestion(raw, doc) {
      const startLine = raw.startLine || raw.line;
      const endLine = raw.endLine || startLine;
      const oldText = raw.oldText || raw.original || '';
      const newText = raw.newText || raw.suggested || '';
      if (!startLine || startLine < 1 || startLine > doc.lines) return null;
      const start = doc.line(startLine);
      const end = doc.line(Math.min(endLine || startLine, doc.lines));
      const span = doc.sliceString(start.from, end.to);
      const offset = oldText ? span.indexOf(oldText) : -1;
      const from = offset >= 0 ? start.from + offset : start.from;
      const to = offset >= 0 ? from + oldText.length : end.to;
      return {
        id: raw.id,
        level: raw.level || 'L2',
        dimension: raw.dimension || '',
        startLine,
        endLine,
        oldText,
        newText,
        reason: raw.reason || raw.source || '',
        changeSummary: raw.changeSummary || '',
        confidence: raw.confidence || 'medium',
        from,
        to,
        lineTo: end.to,
      };
    }

    function visibleSuggestions() {
      const layer = document.getElementById('layerSelect').value;
      return state.suggestions.filter(s => !state.decisions[s.id] && (layer === 'all' || s.level === layer));
    }

    function updateMeta() {
      const pending = visibleSuggestions();
      const current = pending.length ? Math.min(state.activeIndex + 1, pending.length) : 0;
      document.getElementById('meta').textContent = `${state.runId || ''} · ${current} of ${pending.length} · 总建议 ${state.suggestions.length}`;
    }

    function dispatchSuggestions() {
      if (!state.view) return;
      const normalized = state.suggestions
        .filter(s => !state.decisions[s.id])
        .filter(s => document.getElementById('layerSelect').value === 'all' || s.level === document.getElementById('layerSelect').value);
      state.view.dispatch({ effects: setSuggestionsEffect.of(normalized) });
      updateMeta();
    }

    function mapSuggestions(changes) {
      state.suggestions = state.suggestions.map(item => ({
        ...item,
        from: changes.mapPos(item.from, 1),
        to: changes.mapPos(item.to, -1),
        lineTo: changes.mapPos(item.lineTo, -1),
      }));
    }

    function scrollToSuggestion(indexDelta = 0) {
      const pending = visibleSuggestions();
      if (!pending.length) { updateMeta(); return; }
      state.activeIndex = (state.activeIndex + indexDelta + pending.length) % pending.length;
      const target = pending[state.activeIndex];
      state.view.dispatch({ selection: { anchor: target.from }, scrollIntoView: true });
      updateMeta();
    }

    function applyDecision({ id, decision, finalText }) {
      const s = state.suggestions.find(item => item.id === id);
      if (!s) return;
      const currentText = state.view.state.doc.sliceString(s.from, s.to);
      if (decision !== 'rejected' && s.oldText && currentText !== s.oldText) {
        const message = `这条建议对应的原文已经被编辑过。\n\n当前文本：${currentText}\n\n原建议定位文本：${s.oldText}\n\n仍然用建议内容覆盖当前文本吗？`;
        if (!window.confirm(message)) return;
      }
      if (decision !== 'rejected' && finalText === '' && s.oldText && !window.confirm('确认用空文本替换原文吗？这会删除对应内容。')) return;
      state.decisions[id] = { id, decision, finalText, reviewerNote: '' };
      const insert = finalText === null || finalText === undefined ? s.newText : finalText;
      const change = decision === 'rejected' ? null : { from: s.from, to: s.to, insert };
      const effects = [resolveSuggestionEffect.of({ id })];
      if (change) effects.push(addModifiedEffect.of({ from: s.from, to: s.from + insert.length }));
      const transaction = state.view.state.update({ changes: change || undefined, effects });
      if (change) mapSuggestions(transaction.changes);
      state.skipNextSuggestionMap = Boolean(change);
      state.view.dispatch(transaction);
      state.activeIndex = 0;
      dispatchSuggestions();
    }

    function hideSelectionTools() {
      document.getElementById('selectionTools').classList.remove('visible');
    }

    function hideManualPanel() {
      document.getElementById('manualPanel').classList.remove('visible');
      state.manualSelection = null;
    }

    function showSelectionTools() {
      if (!state.view) return;
      const selection = state.view.state.selection.main;
      const tools = document.getElementById('selectionTools');
      if (selection.empty) { hideSelectionTools(); return; }
      const coords = state.view.coordsAtPos(selection.to) || state.view.coordsAtPos(selection.from);
      if (!coords) { hideSelectionTools(); return; }
      state.manualSelection = { from: selection.from, to: selection.to };
      tools.style.left = `${Math.min(coords.left, window.innerWidth - 140)}px`;
      tools.style.top = `${Math.min(coords.bottom + 8, window.innerHeight - 48)}px`;
      tools.classList.add('visible');
    }

    function openManualPanel() {
      if (!state.view || !state.manualSelection) return;
      const panel = document.getElementById('manualPanel');
      const textarea = document.getElementById('manualText');
      const { from, to } = state.manualSelection;
      const coords = state.view.coordsAtPos(to) || state.view.coordsAtPos(from);
      textarea.value = state.view.state.doc.sliceString(from, to);
      panel.style.left = `${Math.min((coords && coords.left) || 12, window.innerWidth - 540)}px`;
      panel.style.top = `${Math.min(((coords && coords.bottom) || 80) + 8, window.innerHeight - 180)}px`;
      panel.classList.add('visible');
      hideSelectionTools();
      textarea.focus();
      textarea.select();
    }

    function applyManualEdit() {
      if (!state.view || !state.manualSelection) return;
      const { from, to } = state.manualSelection;
      const insert = document.getElementById('manualText').value;
      if (insert === '' && !window.confirm('确认删除选中的正文吗？')) return;
      const id = `CE-MANUAL-${String(++state.manualEditCount).padStart(3, '0')}`;
      state.decisions[id] = { id, decision: 'edited', finalText: insert, reviewerNote: 'manual copyediting edit' };
      const transaction = state.view.state.update({
        changes: { from, to, insert },
        effects: addModifiedEffect.of({ from, to: from + insert.length })
      });
      mapSuggestions(transaction.changes);
      state.skipNextSuggestionMap = true;
      state.view.dispatch(transaction);
      hideManualPanel();
      dispatchSuggestions();
    }

    async function api(path, options) {
      const res = await fetch(path, options);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function loadRuns() {
      const data = await api('/api/runs');
      state.runs = data.runs || [];
      const select = document.getElementById('runSelect');
      select.innerHTML = '';
      for (const run of state.runs) {
        const option = document.createElement('option');
        option.value = run.id;
        option.textContent = run.id;
        select.appendChild(option);
      }
      if (!state.runs.length) {
        document.getElementById('meta').textContent = '未找到审查目录';
        return;
      }
      await loadRun(data.current || state.runs[state.runs.length - 1].id);
    }

    async function loadRun(runId) {
      const data = await api('/api/run/' + encodeURIComponent(runId));
      state.runId = runId;
      state.source = data.source || '';
      state.decisions = {};
      state.manualEditCount = 0;
      state.manualSelection = null;
      for (const item of (data.decisions && data.decisions.decisions) || []) state.decisions[item.id] = item;

      const baseExtensions = [
        lineNumbers(),
        EditorView.lineWrapping,
        history(),
        drawSelection(),
        markdown({ base: markdownLanguage }),
        syntaxHighlighting(defaultHighlightStyle, { fallback: true }),
        bracketMatching(),
        indentOnInput(),
        closeBrackets(),
        autocompletion(),
        keymap.of([indentWithTab, ...closeBracketsKeymap, ...defaultKeymap, ...searchKeymap, ...historyKeymap, ...completionKeymap]),
        EditorView.updateListener.of(update => {
          if (!update.docChanged) return;
          if (state.skipNextSuggestionMap) {
            state.skipNextSuggestionMap = false;
            return;
          }
          mapSuggestions(update.changes);
          dispatchSuggestions();
        }),
        state.dark ? oneDark : lightTheme,
        reviewField,
        modifiedField,
      ];
      if (state.view) state.view.destroy();
      state.view = new EditorView({
        parent: document.getElementById('editor'),
        state: EditorState.create({ doc: state.source, extensions: baseExtensions })
      });
      document.getElementById('runSelect').value = runId;
      state.suggestions = ((data.suggestions && data.suggestions.suggestions) || [])
        .map(raw => normalizeSuggestion(raw, state.view.state.doc))
        .filter(Boolean);
      state.activeIndex = 0;
      dispatchSuggestions();
      scrollToSuggestion(0);
    }

    async function save(commitToSource = false) {
      if (state.saving) return;
      if (commitToSource && !window.confirm('确认要把已接受/编辑后的结果直接写回输入文档吗？服务端会先创建备份。')) return;
      const saveBtn = document.getElementById('saveBtn');
      const commitBtn = document.getElementById('commitBtn');
      state.saving = true;
      saveBtn.disabled = true;
      commitBtn.disabled = true;
      try {
        const payload = { decisions: Object.values(state.decisions), commitToSource, reviewedMarkdown: state.view.state.doc.toString() };
        const result = await api('/api/run/' + encodeURIComponent(state.runId) + '/decisions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const writeBack = result.committedToSource ? ` · 已写回输入文档，备份：${result.backupFile}` : '';
        document.getElementById('meta').textContent = `${state.runId} · 已保存当前审阅稿 · ${result.savedDecisions} 条决策${writeBack}`;
      } finally {
        state.saving = false;
        saveBtn.disabled = false;
        commitBtn.disabled = false;
      }
    }

    window.addEventListener('copyediting:decision', event => applyDecision(event.detail));
    document.getElementById('runSelect').addEventListener('change', event => loadRun(event.target.value));
    document.getElementById('layerSelect').addEventListener('change', () => { state.activeIndex = 0; dispatchSuggestions(); scrollToSuggestion(0); });
    document.getElementById('prevBtn').addEventListener('click', () => scrollToSuggestion(-1));
    document.getElementById('nextBtn').addEventListener('click', () => scrollToSuggestion(1));
    document.getElementById('themeBtn').addEventListener('click', () => { state.dark = !state.dark; document.body.classList.toggle('dark', state.dark); document.getElementById('themeBtn').textContent = state.dark ? 'Light' : 'Dark'; });
    document.getElementById('saveBtn').addEventListener('click', () => save(false));
    document.getElementById('commitBtn').addEventListener('click', () => save(true));
    document.getElementById('manualEditBtn').addEventListener('click', openManualPanel);
    document.getElementById('manualCancelBtn').addEventListener('click', hideManualPanel);
    document.getElementById('manualApplyBtn').addEventListener('click', applyManualEdit);
    ['mousedown', 'mouseup', 'click', 'keydown', 'keyup', 'beforeinput', 'input', 'compositionstart', 'compositionupdate', 'compositionend'].forEach(type => {
      document.getElementById('manualText').addEventListener(type, event => event.stopPropagation());
    });
    document.addEventListener('selectionchange', () => setTimeout(showSelectionTools, 0));
    document.addEventListener('mousedown', event => {
      if (!event.target.closest('#selectionTools') && !event.target.closest('#manualPanel') && !event.target.closest('.cm-editor')) hideSelectionTools();
    });
    loadRuns().catch(err => { document.getElementById('meta').textContent = err.message; });
